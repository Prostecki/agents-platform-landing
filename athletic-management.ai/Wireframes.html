<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ede8; font-family: -apple-system, BlinkMacSystemFont, SF Pro Display, SF Pro Text, sans-serif; }

  /* Sketchy style globals */
  .sketch-box {
    border: 2px solid #1a1a1a;
    background: #faf9f7;
    border-radius: 3px;
    position: relative;
  }
  .sketch-box::after {
    content: '';
    position: absolute;
    inset: 2px;
    border: 1px dashed rgba(0,0,0,0.1);
    border-radius: 2px;
    pointer-events: none;
  }
  .sketch-dark {
    border: 2px solid #1a1a1a;
    background: #1a1a1a;
    border-radius: 3px;
  }
  .sketch-gray {
    border: 2px solid #888;
    background: #e5e3df;
    border-radius: 3px;
  }
  .sketch-accent {
    border: 2px solid #1a1a1a;
    background: #c8f0d0;
    border-radius: 3px;
  }
  .sketch-accent2 {
    border: 2px solid #1a1a1a;
    background: #d0e8f8;
    border-radius: 3px;
  }
  .label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: absolute;
    top: 4px;
    right: 6px;
  }
  .annotation {
    font-family: -apple-system, BlinkMacSystemFont, SF Pro Display, SF Pro Text, sans-serif;
    font-size: 13px;
    color: #555;
    font-style: italic;
  }
  .arrow {
    font-size: 16px;
    color: #888;
  }

  /* Wireframe page container */
  .wf-page {
    width: 320px;
    min-height: 560px;
    background: #faf9f7;
    border: 2.5px solid #1a1a1a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    box-shadow: 4px 4px 0 #1a1a1a;
  }

  /* Direction labels */
  .dir-badge {
    display: inline-block;
    background: #1a1a1a;
    color: #f0ede8;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .dir-title {
    font-family: -apple-system, BlinkMacSystemFont, SF Pro Display, SF Pro Text, sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
  }

  .dir-desc {
    font-family: -apple-system, BlinkMacSystemFont, SF Pro Display, SF Pro Text, sans-serif;
    font-size: 14px;
    color: #666;
    margin-bottom: 16px;
    line-height: 1.4;
  }

  /* Hatch pattern for image placeholders */
  .hatch {
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      rgba(0,0,0,0.08) 4px,
      rgba(0,0,0,0.08) 5px
    );
  }
  .hatch-dark {
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      rgba(255,255,255,0.06) 4px,
      rgba(255,255,255,0.06) 5px
    );
  }
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>

/* ─── WIREFRAME DIRECTION 1: Dark Terminal ─── */
function WF_DarkTerminal() {
  const S = {
    page: { width: 320, background: '#111', fontFamily: '-apple-system, BlinkMacSystemFont, SF Pro Display, SF Pro Text, sans-serif', overflow: 'hidden', border: '1.5px solid rgba(0,0,0,0.12)', borderRadius: 12, boxShadow: '0 4px 24px rgba(0,0,0,0.10)' },

    navLinks: { display: 'flex', gap: 10 },
    navLink: { color: '#666', fontSize: 11, fontFamily: 'Space Mono, monospace' },

    hero: { padding: '20px 14px 16px', borderBottom: '1px solid #2a2a2a' },

            <div style={S.probItem}>Nutrition coach knows nothing about yesterday's brutal session</div>

          <div style={S.probCol}>
            <div style={S.probHead}>WITH ATHLETE AI</div>
            <div style={S.solItem}>Nutrition sees your full training load automatically</div>
            <div style={S.solItem}>Training adapts to your fuel status in real time</div>
            <div style={S.solItem}>Agents consult each other. You just ask.</div>
          </div>
        </div>
      </div>

      {/* Demo */}
      <div style={S.section}>
        <div style={S.sectionLabel}>LIVE DEMO</div>
        <div style={S.demoCard}>
          <div style={S.demoMsg}>
            <div style={{ ...S.demoAvatar, background: '#1a1a1a', border: '1px solid #555' }}></div>
            <div style={S.demoBubble}>I have a speed endurance session tomorrow. What should I eat tonight?</div>
          </div>
          <div style={S.demoSystem}>⟳ Consulting training agent...</div>
          <div style={S.demoMsg}>
            <div style={S.demoAvatar}></div>
            <div style={S.demoBubble}>Based on tomorrow's 87 TSS speed work, prioritize 180g carbs tonight. 3-4hrs pre-sleep window. Avoid high fiber.</div>
          </div>
        </div>
      </div>

      {/* Steps */}
      <div style={S.section}>
        <div style={S.sectionLabel}>HOW IT WORKS</div>
        <div style={S.stepsRow}>
          {[['1', 'Ask', 'Talk to either agent naturally'],['2', 'Consult', 'A2A triggers context sharing'],['3', 'Act', 'Response informed by full context']].map(([n,t,d]) => (

              <div style={S.stepDesc}>{d}</div>
